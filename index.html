<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freeride Bariloche</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('foto1.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 30px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, black, transparent);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 3em;
  font-weight: 900;
  letter-spacing: 2px;
}

.hero p {
  opacity: 0.8;
}

/* BOTONES */
.btn {
  background: #ff2d00;
  padding: 14px 24px;
  border-radius: 30px;
  color: white;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
  font-weight: 600;
}

/* SECCIONES */
.section {
  padding: 80px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* GALERIA */
.gallery {
  display: grid;
  grid-template-columns: 1fr;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* BOTÓN WHATSAPP FLOTANTE */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 15px 18px;
  border-radius: 50%;
  text-decoration: none;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  z-index: 999;
}

/* DESKTOP */
@media (min-width: 768px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
  }

  .gallery img {
    height: 420px;
  }

  .hero h1 {
    font-size: 4em;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>BARILOCHE FREERIDE</h1>
    <p>Adrenalina. Montaña. Real.</p>
    <a class="btn" href="https://wa.me/549XXXXXXXXXX">Reservar ahora</a>
  </div>
</div>

<!-- FRASE -->
<div class="section">
  <h2>No es turismo. Es experiencia.</h2>
</div>

<!-- GALERIA -->
<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
</div>

<!-- CTA -->
<div class="section">
  <h2>¿Listo para vivirlo?</h2>
  <a class="btn" href="https://instagram.com/@bariloche_voy">Ver Instagram</a>
</div>

<!-- BOTÓN WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5492944204802" target="_blank">
  💬
</a>

<script>
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('visible');
    }
  });
});
</script>

</body>
</html>
