<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freeride Bariloche</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('foto1.jpg') center/cover no-repeat;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 40px;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, #000 10%, transparent 60%);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

.hero h1 {
  font-size: 3.5em;
  font-weight: 800;
  letter-spacing: 2px;
}

.hero p {
  font-weight: 300;
  opacity: 0.8;
}

/* BOTONES */
.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 14px 26px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 500;
  background: #ff2d00;
  color: white;
}

/* FRASE GRANDE */
.statement {
  padding: 100px 20px;
  text-align: center;
  font-size: 1.8em;
  font-weight: 300;
  max-width: 800px;
  margin: auto;
}

/* GALERIA ESTILO EDITORIAL */
.gallery {
  display: grid;
  grid-template-columns: 1fr;
}

.gallery img {
  width: 100%;
  height: 80vh;
  object-fit: cover;
}

/* TEXTO SOBRE IMAGEN */
.block {
  position: relative;
}

.block span {
  position: absolute;
  bottom: 30px;
  left: 30px;
  font-size: 1.5em;
  font-weight: 600;
}

/* CTA FINAL */
.cta {
  padding: 100px 20px;
  text-align: center;
}

.cta h2 {
  font-size: 2em;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 16px 18px;
  border-radius: 50%;
  font-size: 22px;
  text-decoration: none;
  color: white;
  z-index: 999;
}

/* DESKTOP */
@media (min-width: 768px) {

.hero h1 {
  font-size: 5em;
}

.gallery {
  grid-template-columns: repeat(2, 1fr);
}

.gallery img {
  height: 70vh;
}

.statement {
  font-size: 2.2em;
}

}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>FREERIDE BRC</h1>
    <p>No vengas a Bariloche. Vení a vivirlo.</p>
    <a class="btn" href="https://wa.me/549XXXXXXXXXX">Reservar experiencia</a>
  </div>
</div>

<!-- FRASE -->
<div class="statement">
  Esto no es turismo.  
  Es bajar un sendero con el corazón acelerado.  
  Es ver un atardecer que no entra en una foto.
</div>

<!-- GALERIA CINEMATICA -->
<div class="gallery">

  <div class="block">
    <img src="foto1.jpg">
    <span>Velocidad</span>
  </div>

  <div class="block">
    <img src="foto2.jpg">
    <span>Altura</span>
  </div>

  <div class="block">
    <img src="foto3.jpg">
    <span>Silencio</span>
  </div>

  <div class="block">
    <img src="foto4.jpg">
    <span>Adrenalina</span>
  </div>

  <div class="block">
    <img src="foto5.jpg">
    <span>Libertad</span>
  </div>

  <div class="block">
    <img src="foto6.jpg">
    <span>Real</span>
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <h2>¿Estás listo?</h2>
  <a class="btn" href="https://instagram.com/@bariloche_voy">Ver experiencias</a>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5492944204802">💬</a>

</body>
</html>
